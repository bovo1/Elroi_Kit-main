name: Build Installer
on:
  push:
    branches:
      - main

env:
  ver: 1.7.2

jobs:
  build:
    name: Build the Inno Setup Installer
    runs-on: self-hosted
      
    steps:
      # 소스 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # 필요한 라이브러리 설치 및 패키징
      - name: Obfuscation & Packaging
        run: |
          echo off
          pip install C:\Build-Server\ElroiKit\dependency\lib\PyQt5_commercial-5.15.9-cp37-abi3-win_amd64.whl
          pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cu126
          pip install distinctipy==1.3.4

          pyarmor register C:\Build-Server\ElroiKit\dependency\lib\pyarmor-regfile-2740.zip
          pyarmor pack -s .\ElroiKit.spec .\src\ElroiKit.py --clean

      # .NSI 스크립트를 이용하여 .EXE 생성
      - name: Compile .NSI to .EXE Installer
        run: |
          $dir = "C:\Build-Server\ElroiKit\deploy\${{env.ver}}"
          if (-Not (Test-Path -Path $dir)) {
            New-Item -ItemType Directory -Path $dir
          }
          & "C:\NSIS\makensis.exe" "C:\Build-Server\ElroiKit\ElroiKit.nsi"